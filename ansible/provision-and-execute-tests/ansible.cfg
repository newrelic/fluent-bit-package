[defaults]
# To avoid Ansible printing warnings such as:
# [WARNING]: Platform linux on host ... is using the discovered Python interpreter at /usr/libexec/platform-python, but future installation of another Python interpreter could change the meaning of that path. See https://docs.ansible.com/ansible-
#  core/2.15/reference_appendices/interpreter_discovery.html for more information.
interpreter_python = auto_silent
# Increased forks for better parallel execution across many hosts
forks = 30
# Increase timeout for slow connections (especially ARM instances)
timeout = 120
# Gather facts with longer timeout
gather_timeout = 60
# Connection retry settings
host_key_checking = False

[connection]
# Pipelining can improve performance but may cause issues with some connections
pipelining = False
# Connection timeout
timeout = 120

[persistent_connection]
# Timeout for persistent connections (SSH, SSM)
connect_timeout = 120
command_timeout = 120
# Retry on connection reset
retries = 5

[ssh_connection]
# SSH-specific settings that also affect SSM in some cases
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30 -o ServerAliveCountMax=5
# Retry failed connections
retries = 5
# Pipelining off for more stability
pipelining = False