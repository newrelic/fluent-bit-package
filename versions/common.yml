fbVersion: 5.0.7

# New Relic Fluent Bit Output Plugin Configuration
# These values are used during E2E testing to download and test a specific version of the NR output plugin
nrFbOutputPluginVersion: 3.6.0
# Optional: Override the GitHub release tag (defaults to v{nrFbOutputPluginVersion} if not set)
# Use this for custom/beta releases where the tag differs from the standard v{version} format
# Example for beta: nrFbOutputPluginTag: newrelic-fluent-bit-output-3.3.1-beta-rhel8-test
# nrFbOutputPluginTag:

# Test Instance Cleanup Configuration
# Controls whether EC2 test instances are automatically terminated after test failures
# This is a COST CONTROL setting to prevent instances from running indefinitely
alwaysCleanupTestInstances: true  # Default: true (terminate instances even on failure to minimize AWS costs)
                                   # Set to false to keep instances alive on failure for debugging
                                   # Annual savings from default=true: ~$150-400/year from preventing forgotten instances

