name: run_e2e_tests HW workflow

permissions:
  contents: read
  id-token: write
  checks: write

on:
  # To be able to launch it from pull_request.yml programmatically
  workflow_call:
    inputs:
      gh_release_name:
        description: GitHub release name containing Fluent Bit packages
        required: false
        default: latest
        type: string
      infra_agent_version:
        description: Infrastructure Agent version
        required: true
        default: latest
        type: string
      infra_agent_env:
        description: Repository used to download infra-agent
        required: false
        default: staging
        type: string  # To be able to launch it from the Actions UI, on-demand
      test_report_filename:
        description: Test report to process and act upon by the actions
        required: false
        default: test-report-prerelease.xml
        type: string  # To be able to launch it from the Actions UI, on-demand
      sles_matrix:
        description: Matrix of SLES distros, versions, and architectures to run the tests on
        required: false
        type: string
        default: '[]'
  workflow_dispatch:
    inputs:
      gh_release_name:
        description: GitHub release name containing Fluent Bit packages
        required: false
        default: latest
        type: string
      infra_agent_version:
        description: Infrastructure Agent version
        required: true
        default: latest
        type: string
      infra_agent_env:
        description: Repository used to download infra-agent
        required: false
        default: production
        type: string  # To be able to launch it from the Actions UI, on-demand
      test_report_filename:
        description: Test report to process and act upon by the actions
        required: false
        default: test-report-prerelease.xml
        type: string  # To be able to launch it from the Actions UI, on-demand
      sles_matrix:
        description: Matrix of SLES distros, versions, and architectures to run the tests on
        required: false
        type: string
        default: '[]'

# So that only one test suite will be run simultaneously against a given GH release. This ensures that there will not
# be multiple runners accessing the same Terraform state at the same time. Note that we need to set this lock here as well
# as in the pull_request.yml since this workflow can also be run on-demand from the UI, and potentially by the infrastructure-agent
# CI/CD pipeline.
concurrency: e2e-workflow-${{ inputs.gh_release_name }}

jobs:
  spin_up_test_executor_instances:
    name: Spin up test executor instances
    uses: ./.github/workflows/run_task.yml
    with:
      container_make_target: "terraform/ec2-test-executors/${{ inputs.infra_agent_env }} PRE_RELEASE_NAME=${{ inputs.gh_release_name }}"
    secrets: inherit

  # Split provisioning into 3 parallel jobs by OS family
  provision_linux_apt:
    name: Provision APT distros (debian, ubuntu)
    needs: spin_up_test_executor_instances
    uses: ./.github/workflows/run_task.yml
    with:
      container_make_target: "ansible/provision-and-execute-tests/${{ inputs.infra_agent_env }}-linux-provision-apt PRE_RELEASE_NAME=${{ inputs.gh_release_name }}"
    secrets: inherit

  provision_linux_yum:
    name: Provision YUM distros (amazonlinux, centos, rocky)
    needs: spin_up_test_executor_instances
    uses: ./.github/workflows/run_task.yml
    with:
      container_make_target: "ansible/provision-and-execute-tests/${{ inputs.infra_agent_env }}-linux-provision-yum PRE_RELEASE_NAME=${{ inputs.gh_release_name }}"
    secrets: inherit

  provision_linux_sles:
    name: Provision SLES distros
    needs: spin_up_test_executor_instances
    if: ${{ inputs.sles_matrix != '[]' }}
    uses: ./.github/workflows/run_task.yml
    with:
      container_make_target: "ansible/provision-and-execute-tests/${{ inputs.infra_agent_env }}-linux-provision-sles PRE_RELEASE_NAME=${{ inputs.gh_release_name }}"
    secrets: inherit

  # Parallel test execution by OS family
  test_linux_apt_distros:
    name: Test APT distros (debian, ubuntu)
    needs: [ provision_linux_apt ]
    if: ${{ always() && !failure() && !cancelled() && needs.provision_linux_apt.result == 'success' }}
    uses: ./.github/workflows/run_task.yml
    with:
      container_make_target: "ansible/provision-and-execute-tests/${{ inputs.infra_agent_env }}-linux-test-apt PRE_RELEASE_NAME=${{ inputs.gh_release_name }} TEST_REPORT_NAME=${{ inputs.test_report_filename }}"
    secrets: inherit

  test_linux_yum_distros:
    name: Test YUM distros (amazonlinux, centos, rocky)
    needs: [ provision_linux_yum ]
    if: ${{ always() && !failure() && !cancelled() && needs.provision_linux_yum.result == 'success' }}
    uses: ./.github/workflows/run_task.yml
    with:
      container_make_target: "ansible/provision-and-execute-tests/${{ inputs.infra_agent_env }}-linux-test-yum PRE_RELEASE_NAME=${{ inputs.gh_release_name }} TEST_REPORT_NAME=${{ inputs.test_report_filename }}"
    secrets: inherit

  test_linux_sles_distros:
    name: Test SLES distros
    needs: [ provision_linux_sles ]
    if: ${{ always() && !failure() && !cancelled() && needs.provision_linux_sles.result == 'success' && inputs.sles_matrix != '[]' }}
    uses: ./.github/workflows/run_task.yml
    with:
      container_make_target: "ansible/provision-and-execute-tests/${{ inputs.infra_agent_env }}-linux-test-sles PRE_RELEASE_NAME=${{ inputs.gh_release_name }} TEST_REPORT_NAME=${{ inputs.test_report_filename }}"
    secrets: inherit

  merge_test_results:
    name: Merge test results
    needs: [ test_linux_apt_distros, test_linux_yum_distros, test_linux_sles_distros ]
    if: ${{ always() && !cancelled()
      && (needs.test_linux_apt_distros.result == 'success' || needs.test_linux_apt_distros.result == 'skipped')
      && (needs.test_linux_yum_distros.result == 'success' || needs.test_linux_yum_distros.result == 'skipped')
      && (needs.test_linux_sles_distros.result == 'success' || needs.test_linux_sles_distros.result == 'skipped') }}
    uses: ./.github/workflows/run_task.yml
    with:
      container_make_target: "ansible/provision-and-execute-tests/${{ inputs.infra_agent_env }}-linux-merge-all PRE_RELEASE_NAME=${{ inputs.gh_release_name }} TEST_REPORT_NAME=${{ inputs.test_report_filename }}"
    secrets: inherit

  report_test_results:
    name: Report results
    runs-on: ubuntu-latest
    needs: merge_test_results
    if: ${{ always() && !failure() && !cancelled() && needs.merge_test_results.result == 'success' }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download report from pre-release
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: gh release download ${{ inputs.gh_release_name }} --pattern ${{ inputs.test_report_filename }}

      - name: Tests Report Details
        uses: dorny/test-reporter@v1
        with:
          name: Tests Report Details  # Name of the check run which will be created
          path: ${{ inputs.test_report_filename }} # Path to test results
          reporter: jest-junit

      - name: Tests Report Summary
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            ${{ inputs.test_report_filename }}

  tear_down_test_executor_instances:
    name: Tear down test executor instances
    if: always()
    needs: [ report_test_results, provision_linux_apt, provision_linux_yum, provision_linux_sles, test_linux_apt_distros, test_linux_yum_distros, test_linux_sles_distros ]
    uses: ./.github/workflows/run_task.yml
    with:
      container_make_target: "terraform/ec2-test-executors/clean PRE_RELEASE_NAME=${{ inputs.gh_release_name }}"
    secrets: inherit
